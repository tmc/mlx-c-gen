schema_version: 1

mlx:
  # Pinned to an untagged MLX commit in git-describe form: det/slogdet (PR #3416)
  # landed 8 commits past v0.31.2 and the committed linalg bindings depend on
  # them, but no release tag includes them yet. The "-8-g0938db7" suffix is a
  # resolvable git ref (rev-parse and CMake GIT_TAG both accept it). Bump to a
  # release tag once one includes det/slogdet.
  expected_git_ref: v0.31.2-8-g0938db7

report:
  require_clean_generated: true
  require_api_lock: true
  require_doc_coverage: true
  require_type_coverage: true
  require_diagnostic_reasons: true
  require_explicit_variants: true
  require_decision_decl_ids: true
  require_decision_coverage: true
  require_emit_api_lock: true
  require_unique_c_names: true
  include_inventory: true

generated_markers:
  forbid_volatile_data: true

module_files:
  - modules/ops.yaml
  - modules/linalg.yaml
  - modules/random.yaml
  - modules/fft.yaml
  - modules/fast.yaml
  - modules/io.yaml
  - modules/compile.yaml
  - modules/transforms.yaml
  - modules/transforms_impl.yaml
  - modules/memory.yaml
  - modules/metal.yaml
  - modules/cuda.yaml
  - modules/graph_utils.yaml
  - modules/distributed.yaml

standalone:
  - vector
  - closure
  - map

custom_hooks:
  - c_name: mlx_fast_cuda_kernel
    reason: custom CUDA kernel API
  - c_name: mlx_fast_metal_kernel
    reason: custom Metal kernel API
  - c_name: mlx_load_gguf
    reason: custom GGUF loading API
  - c_name: mlx_save_gguf
    reason: custom GGUF saving API

hook_api:
  - c_name: mlx_export_to_dot
    names:
      - mlx_node_namer
      - mlx_node_namer_new
      - mlx_node_namer_free
      - mlx_node_namer_set_name
      - mlx_node_namer_get_name
      - mlx_export_to_dot
  - c_name: mlx_fast_cuda_kernel
    names:
      - mlx_fast_cuda_kernel_config
      - mlx_fast_cuda_kernel_config_new
      - mlx_fast_cuda_kernel_config_free
      - mlx_fast_cuda_kernel_config_add_output_arg
      - mlx_fast_cuda_kernel_config_set_grid
      - mlx_fast_cuda_kernel_config_set_thread_group
      - mlx_fast_cuda_kernel_config_set_init_value
      - mlx_fast_cuda_kernel_config_set_verbose
      - mlx_fast_cuda_kernel_config_add_template_arg_dtype
      - mlx_fast_cuda_kernel_config_add_template_arg_int
      - mlx_fast_cuda_kernel_config_add_template_arg_bool
      - mlx_fast_cuda_kernel
      - mlx_fast_cuda_kernel_new
      - mlx_fast_cuda_kernel_free
      - mlx_fast_cuda_kernel_apply
  - c_name: mlx_fast_metal_kernel
    names:
      - mlx_fast_metal_kernel_config
      - mlx_fast_metal_kernel_config_new
      - mlx_fast_metal_kernel_config_free
      - mlx_fast_metal_kernel_config_add_output_arg
      - mlx_fast_metal_kernel_config_set_grid
      - mlx_fast_metal_kernel_config_set_thread_group
      - mlx_fast_metal_kernel_config_set_init_value
      - mlx_fast_metal_kernel_config_set_verbose
      - mlx_fast_metal_kernel_config_add_template_arg_dtype
      - mlx_fast_metal_kernel_config_add_template_arg_int
      - mlx_fast_metal_kernel_config_add_template_arg_bool
      - mlx_fast_metal_kernel
      - mlx_fast_metal_kernel_new
      - mlx_fast_metal_kernel_free
      - mlx_fast_metal_kernel_apply
  - c_name: mlx_load_gguf
    names:
      - mlx_load_gguf
  - c_name: mlx_print_graph
    names:
      - mlx_print_graph
  - c_name: mlx_save_gguf
    names:
      - mlx_save_gguf

